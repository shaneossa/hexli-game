<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hexli's World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      overflow: hidden;
    }
    #game-container canvas { display: block; }

    #dialog {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 90vw);
      background: rgba(15, 8, 25, 0.95);
      border: 2px solid #b060d0;
      border-radius: 10px;
      padding: 14px 20px;
      color: #f0e8ff;
      font-family: 'Georgia', serif;
      font-size: 15px;
      line-height: 1.5;
      z-index: 100;
      pointer-events: none;
    }
    #dialog-speaker {
      color: #d080ff;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #dialog-hint {
      margin-top: 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      text-align: right;
      font-family: monospace;
    }
    #hud {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.75);
      font-family: 'Georgia', serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      pointer-events: none;
      z-index: 100;
    }
    #collect-hud {
      position: fixed;
      top: 14px;
      right: 18px;
      color: rgba(255,255,255,0.8);
      font-family: 'Georgia', serif;
      font-size: 13px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      pointer-events: none;
      z-index: 100;
    }
    #controls {
      position: fixed;
      bottom: 14px;
      right: 18px;
      color: rgba(255,255,255,0.3);
      font-family: monospace;
      font-size: 10px;
      line-height: 1.8;
      text-align: right;
      pointer-events: none;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="collect-hud">🧶 <span id="cc">0</span>/<span id="ct">7</span></div>
  <div id="dialog">
    <div id="dialog-speaker"></div>
    <div id="dialog-text"></div>
    <div id="dialog-hint">[ E ] to continue</div>
  </div>
  <div id="controls">
    WASD / ↑↓←→ move<br>
    E — talk / interact
  </div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
