<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hexli's World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }
    #canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    #hud {
      position: absolute;
      top: 12px; left: 12px;
      color: #fff;
      text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
      font-size: 13px;
      line-height: 1.6;
    }
    #collectibles {
      position: absolute;
      top: 12px; right: 12px;
      color: #fff;
      text-shadow: 1px 1px 0 #000;
      font-size: 13px;
      text-align: right;
    }
    #dialog {
      position: absolute;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(20,10,30,0.92);
      border: 2px solid #b06fd8;
      border-radius: 8px;
      padding: 12px 20px;
      color: #f0e6ff;
      font-size: 14px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      display: none;
      pointer-events: none;
    }
    #dialog .speaker {
      color: #d48fff;
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #controls-hint {
      position: absolute;
      bottom: 12px; right: 12px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      text-align: right;
      line-height: 1.8;
    }
    #room-label {
      position: absolute;
      top: 12px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 1px 1px 0 #000;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="location-name"></div>
    </div>
    <div id="room-label"></div>
    <div id="collectibles">🧶 <span id="collect-count">0</span> / <span id="collect-total">0</span></div>
    <div id="dialog">
      <div class="speaker" id="dialog-speaker"></div>
      <div id="dialog-text"></div>
    </div>
    <div id="controls-hint">
      Arrow keys / WASD — move<br>
      E — interact
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
